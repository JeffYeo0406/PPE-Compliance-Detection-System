name: ci

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Validate ONNX artifact
        run: |
          python - <<'PY'
          import onnxruntime
          onnxruntime.InferenceSession('models/best_int8.onnx')
          print('ONNX load OK')
          PY

      - name: Lint
        run: |
          ruff check app.py inference.py utils.py
